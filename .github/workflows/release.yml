name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.derive.outputs.short_sha }}
      semver: ${{ steps.derive.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Derive version strings
        id: derive
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          SEMVER="${GITHUB_REF_NAME#v}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Verify SHA-tagged image exists in ACR
        run: |
          SHORT_SHA="${{ steps.derive.outputs.short_sha }}"
          if ! docker manifest inspect "${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:sha-${SHORT_SHA}" > /dev/null 2>&1; then
            echo "No image found for backend:sha-${SHORT_SHA}. Ensure the Build & Publish pipeline completed for this commit before tagging."
            exit 1
          fi

  retag:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Retag backend image to SemVer
        run: |
          docker buildx imagetools create \
            --tag "${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:${{ needs.verify.outputs.semver }}" \
            "${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:sha-${{ needs.verify.outputs.short_sha }}"

  helm:
    needs: [verify, retag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Update chart versions and image values
        run: ./scripts/update-chart-versions.sh "${{ needs.verify.outputs.semver }}" "${{ needs.verify.outputs.semver }}"
      - name: Package Helm chart
        run: helm package ./charts/xero-mcp
      - name: Log in to ACR OCI registry
        run: |
          helm registry login "${{ secrets.ACR_REGISTRY }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"
      - name: Push Helm chart to ACR
        run: helm push xero-mcp-*.tgz "oci://${{ secrets.ACR_REGISTRY }}/xero-mcp"

  release:
    needs: helm
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
