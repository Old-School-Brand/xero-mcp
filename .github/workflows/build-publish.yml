name: Build & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  # ── Gate: all checks must pass before building/publishing ──
  test-backend:
    uses: ./.github/workflows/test-backend.yml
    secrets: inherit

  test-docker-compose:
    uses: ./.github/workflows/test-docker-compose.yml
    secrets: inherit

  lint-helm:
    uses: ./.github/workflows/lint-helm.yml
    secrets: inherit

  # ── Build & Publish (only runs after the gate passes) ──
  version:
    needs: [test-backend, test-docker-compose, lint-helm]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      chart_version: ${{ steps.version.outputs.chart_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Derive version strings
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          TIMESTAMP=$(date +%s)
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "chart_version=0.0.0-${TIMESTAMP}.sha.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build-scan-push:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:${{ needs.version.outputs.image_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:${{ needs.version.outputs.image_tag }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Report-only here: in SARIF mode the action scans all severities and
          # includes unfixed CVEs, so exit-code 1 would fail on the base image's
          # unfixable Debian CVEs. The authoritative CRITICAL/HIGH gate is the
          # table-format scan in pr-gate. (Matches plm-lite's build-publish.)
          exit-code: '0'
      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-backend
          path: trivy-backend.sarif
          retention-days: 30
      - name: Push backend image to ACR
        run: docker push "${{ secrets.ACR_REGISTRY }}/xero-mcp/backend:${{ needs.version.outputs.image_tag }}"

  helm:
    needs: [version, build-scan-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Update chart versions and image values
        run: ./scripts/update-chart-versions.sh "${{ needs.version.outputs.chart_version }}" "${{ needs.version.outputs.image_tag }}"
      - name: Package Helm chart
        run: helm package ./charts/xero-mcp
      - name: Log in to ACR OCI registry
        run: |
          helm registry login "${{ secrets.ACR_REGISTRY }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"
      - name: Push Helm chart to ACR
        run: helm push xero-mcp-*.tgz "oci://${{ secrets.ACR_REGISTRY }}/xero-mcp"
