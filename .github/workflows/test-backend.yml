name: Test Backend

on:
  workflow_call:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Create .env from example
        # xero-client.ts reads XERO_CLIENT_ID/SECRET at module load and throws
        # if unset. Unit tests import the tool tree (which imports the client),
        # so the placeholder values in .env.example are needed to satisfy the
        # check. No test reaches Xero over the network.
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        # Redis is mocked in the unit tests, so no Valkey service is needed.
        run: npm test
