name: Test Docker Compose

on:
  workflow_call:

jobs:
  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: xero-mcp-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Build only — do NOT boot the backend. Unlike cin7-mcp (whose `hello`
      # smoke tool never reaches Cin7), this server calls xeroClient.authenticate()
      # eagerly at startup and fail-fast-exits without valid Xero credentials.
      # A full boot-smoke would require a real read-only refresh token as a CI
      # secret (deferred). We still build the image and assert its hardening.
      - name: Build image
        run: docker compose build

      - name: Image runs as non-root UID 10001
        run: |
          USER=$(docker inspect -f '{{.Config.User}}' xero-mcp:latest)
          echo "Config.User = $USER"
          test "$USER" = "10001:10001"
